# SalesOrbit CRM — Nginx server block
# Deploy: sudo ln -s /var/www/salesorbit/nginx/salesorbit.conf /etc/nginx/sites-enabled/
# Then:   sudo nginx -t && sudo systemctl reload nginx

# ── HTTP: redirect all traffic to HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — managed by Certbot (run: sudo certbot --nginx -d yourdomain.com)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (Helmet covers most of these via Express too)
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    application/atom+xml image/svg+xml;

    # Frontend static files
    root  /var/www/salesorbit/dist;
    index index.html;

    # ── Static assets: long-lived cache ──────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API → Node.js backend ─────────────────────────────────────────────────
    location /api {
        proxy_pass          http://127.0.0.1:5001;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;

        # Allow larger request bodies (CSV import, etc.)
        client_max_body_size 15m;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── React Router — serve index.html for all frontend routes ───────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
