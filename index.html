<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Page title ── -->
    <title>Sales Orbit</title>

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />

    <!-- ── PWA: Web App Manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── PWA: iOS / Safari home-screen support ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sales Orbit" />
    <link rel="apple-touch-icon" href="/icon-maskable.svg" />

    <!-- ── PWA: Theme & display colours ── -->
    <meta name="theme-color" content="#4796E3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C0C0F" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Sales Orbit" />

    <!-- ── SEO & description ── -->
    <meta name="description" content="The B2B sales CRM built for high-velocity teams. Sell Faster. Orbit Further." />
    <meta name="keywords" content="sales CRM, B2B sales, pipeline, leads, opportunities" />

    <!-- ── Open Graph (WhatsApp, LinkedIn, Telegram, iMessage, Slack…) ── -->
    <meta property="og:type"         content="website" />
    <meta property="og:title"        content="Sales Orbit" />
    <meta property="og:description"  content="The B2B sales CRM built for high-velocity teams." />
    <meta property="og:image"        content="/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Sales Orbit" />
    <meta name="twitter:description" content="The B2B sales CRM built for high-velocity teams." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600;700&family=Google+Sans+Display:wght@300;400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Register Service Worker for PWA install prompt ── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err))
        })
      }
    </script>
  </body>
</html>
